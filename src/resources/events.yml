- name: 第四届半咸水语奥公开赛（MOL4）
  description: 'MOL(Mirturl Linguistics Open，半咸水语言学公开赛)是由国际语言学奥林匹克竞赛中国国家队成员自主创办的线上语言学公开挑战赛，旨在向社会推广语言学这一多元多彩的学科。比赛分为个人赛与团队赛两部分。

    而第四届MOL团队赛，组委会将线上Puzzle Hunt中的机制引入传统语奥机制中。本次的团队赛题会存在不同类型的题目，有些完全是正常的语奥题型，有些会更加新颖的融入了PH元素的题目。与此同时，题目会有着PH的结构，即存在若干小题与Meta问题，需要通过不断推进赛程获取新的题目。

    更多关于MOL4团队赛赛制的内容，详见：https://mp.weixin.qq.com/s/P5SmpEX4Szg6N91x5j_uYw

