  hints:
  - question: P·INDEX送的礼物怎么做？
    answer: P·INDEX提示的是Perry Index。你需要找到一个与它相关的书，用FEEDER中存在的该书故事进行计算，结果同样是书中的一个故事。
  - question: 杜先生送的礼物怎么做？
    answer: 杜先生提示的是杜飞，题干给出的是他送礼时的台词。杜飞在剧中送出的所有礼物翻译都出现在FEEDER中，把它们按照顺序列出，注意那些不是礼物本身的词。
  - question: 神秘数字送…的礼物怎么做？
    answer: 本题的主题是电竞选手送……的温暖。尝试直接将FEEDER中的一些词带上“比赛”“神秘数字”搜索，每个选手都有一个与战绩/伤害/特殊事件相关的神秘数字，下方标注了该场比赛的日期（以UTC+8时间为准），进行计算。
  - question: 你应该先送礼物提升我的好感度，后面忘了怎么做？
    answer: 搜索这些游戏人物喜欢的礼物（在特定游戏中是在类似地位的重要物件），寻找出现FEEDER中的这些礼物，用下方的数字进行INDEX即可。
  - question: 已经离开的某人怎么做？
    answer: 本题的主题是送别诗。首先搜索到这些诗句，注意到这些诗句中未给出提示词的句子中总存在一个单词出现在FEEDER中，且FEEDER中与该单词共同构成FEEDER的另一个词与诗句等长，每句诗提取2位。这些单词的一些特点提供了排序。
  - question: 传送带送的礼物怎么做？
    answer: 注意到FEEDER中只有一些词语可以被放进传送带中。尝试将它们放进去，并且让对角线上出现礼物，此时以顺时针方向在传送带上读出答案。
  - question: META怎么做？
    answer: 本题的主题是“送”，小题答案都存在构成一个与“送”有关的故事、成语或固定成词，被“送”的东西直接翻译提取即可。注意META词语顺序与小题顺序一致。
  - question: 最后一个礼物送的到底是哪种？
    answer: 在你的礼物前面加上“烈”。
